<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-05</title>

    <!-- daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/styles/style.css">
</head>

<body>


    <header>
        <nav class="max-w-[1350px] mx-auto flex justify-between my-6 p-3 bg-[#e9e9e947] rounded">
            <div class="left-side flex flex-col md:flex-row gap-2 justify-start md:items-center ">
                <img class="w-9" src="./assets/github-logo.png" alt="">
                <p class="text-[1.25rem] font-semibold">GitHub Issues Tracker</p>
            </div>

            <div class="right-side flex gap-2">
                <div>
                    <label class="input">
                        <svg id="search-btn" class="h-[2.5em] opacity-50 cursor-pointer"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="search-input" type="search" required placeholder="Search Issues" />
                    </label>
                </div>
                <button class="btn btn-primary"> + New Issue</button>
            </div>
        </nav>
    </header>

    <main class="max-w-[1100px] mx-auto">

        <section>
            <dialog id="issue-modal" class="rounded-lg p-0 w-[450px] m-auto">

                <div id="modal-card" class="bg-white shadow-md rounded-lg p-5 flex flex-col gap-3">

                    

                    <!-- top section -->
                    <div class="flex justify-between items-center">
                        <div id="modal-status-icon"></div>

                        <span id="modal-priority" class="px-3 py-1 text-xs font-semibold rounded-full"></span>
                    </div>

                    <!-- title -->
                    <h3 id="modal-title" class="font-bold text-lg"></h3>

                    <!-- description -->
                    <p id="modal-description" class="text-gray-500 text-sm"></p>

                    <!-- labels -->
                    <div id="modal-labels" class="flex gap-2"></div>

                    <!-- footer -->
                    <div class="border-t pt-3 text-sm text-gray-500">
                        <p id="modal-author"></p>
                        <p id="modal-created"></p>
                    </div>

                    <!-- closee icon -->
                    <div class="flex justify-end">
                        <button onclick="document.getElementById('issue-modal').close()"class="btn">Close</button>
                    </div>

                </div>

            </dialog>

        </section>


        <section class="bg-[#e9e9e947] rounded my-5  flex gap-4 p-3 shadow">
            <button id="all-btn" class="btn btn-primary px-7">All</button>
            <button id="open-btn" class="btn px-5">Open</button>
            <button id="closed-btn" class="btn px-4">Closed</button>
        </section>

        <section class="bg-[#e9e9e947] rounded my-5 p-3 shadow">
            <div class="flex justify-between">
                <div class="flex flex-col md:flex-row gap-3 justify-start md:items-center ">
                    <div>
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h5 id="issues-count" class="font-bold">0 Issues</h5>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>


                <div class="flex gap-4">
                    <div class="flex justify-center items-center gap-1">
                        <div id="dot" class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                        <div>
                            <p>Open</p>
                        </div>
                    </div>
                    <div class="flex justify-center items-center gap-1">
                        <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
                        <div>
                            <p>Closed</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="loading-spinner" class="flex justify-center my-6 hidden">
            <span class="loading loading-dots loading-xl"></span>
        </div>

        <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 my-6 cursor-pointer">

        </div>


    </main>


    <script src="./script/index.js"></script>
</body>

</html>
