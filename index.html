<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles/style.css">
</head>

<body class="flex justify-center items-center min-h-screen bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow w-96 text-center">

        <img src="./assets/github-logo.png" class=" mx-auto mb-3">

        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>

        <p class="text-gray-500 mb-6">Sign in to manage issues</p>

        <input id="username" type="text" placeholder="Username" class="input input-bordered w-full mb-3" />

        <input id="password" type="password" placeholder="Password" class="input input-bordered w-full mb-4" />

        <button id="login-btn" class="btn btn-primary w-full">Sign In</button>

        <p class="text-sm text-gray-500 mt-4">User: admin / pass: admin123</p>
    </div>

    <script src="./script/login.js"></script>
</body>

</html>
